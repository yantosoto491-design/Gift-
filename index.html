<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Surprise Gift</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background:linear-gradient(135deg,#ff9a9e,#fad0c4,#fbc2eb);
    overflow:hidden;
    text-align:center;
    padding:20px;
}

button{
    padding:15px 35px;
    font-size:22px;
    border:none;
    border-radius:50px;
    background:white;
    color:#ff4b7d;
    font-weight:bold;
    cursor:pointer;
    box-shadow:0 0 20px rgba(255,255,255,.7);
    transition:0.3s;
}

button:hover{
    transform:scale(1.08);
}

#surprise{
    display:none;
    margin-top:25px;
    animation:fadeIn 1.5s ease;
    max-width:500px;
}

#surprise img{
    width:260px;
    border-radius:20px;
    box-shadow:0 0 20px rgba(0,0,0,.25);
}

#surprise h1{
    color:white;
    margin-top:15px;
    font-size:34px;
    text-shadow:0 0 10px rgba(255,255,255,.8);
}

#surprise p{
    margin-top:15px;
    color: black;
    font-size:18px;
    line-height:1.6;
    background:rgba(255,255,255,.15);
    padding:15px;
    border-radius:15px;
    backdrop-filter:blur(5px);
}

.confetti{
    position:absolute;
    width:10px;
    height:10px;
    top:-10px;
    animation:fall linear forwards;
}

@keyframes fall{
    to{
        transform:translateY(110vh) rotate(720deg);
    }
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:scale(0.8);
    }
    to{
        opacity:1;
        transform:scale(1);
    }
}
</style>
</head>
<body>

<button onclick="openGift()">tekan</button>

<div id="surprise">
    <img src="IMG_20260420_175926.png" alt="gift">
    <p>
        wkwkwkwk ke gocek lagi
    </p>
</div>

<audio id="music">
<source src="ssstik.io_1776696611791.mp3">
</audio>

<script>
function openGift(){
    document.getElementById("surprise").style.display="block";

    document.getElementById("music").play();

    for(let i=0;i<40;i++){
        let conf=document.createElement("div");
        conf.classList.add("confetti");

        conf.style.left=Math.random()*100+"vw";
        conf.style.background=`hsl(${Math.random()*360},100%,50%)`;
        conf.style.animationDuration=(Math.random()*3+2)+"s";

        document.body.appendChild(conf);

        setTimeout(()=>{
            conf.remove();
        },5000);
    }
}
</script>

</body>
</html>
